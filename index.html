<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moove & Dream — Sélection du design</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      overflow: hidden;
      height: 100vh;
      font-family: -apple-system, 'Segoe UI', sans-serif;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: #080808;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: stretch;
      z-index: 10000;
    }

    .tab-brand {
      display: flex;
      align-items: center;
      padding: 0 1.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      border-right: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tabs {
      display: flex;
      flex: 1;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0 1.6rem;
      background: transparent;
      border: none;
      border-right: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      transition: color 0.2s, background 0.2s;
      position: relative;
      white-space: nowrap;
      outline: none;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 2px;
      background: transparent;
      transition: background 0.25s;
    }
    .tab:hover {
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.025);
    }
    .tab.active { color: #fff; }
    .tab.active::after { background: var(--accent); }

    /* Numéro du design */
    .tab-num {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      color: inherit;
      opacity: 0.4;
    }

    /* Swatch couleur */
    .swatch {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── IFRAMES ── */
    .frames {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .frame.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── LOADING indicator ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tab-brand">Moove &amp; Dream — Choix du design</div>
    <div class="tabs">

      <button class="tab active" data-target="f-mineral" style="--accent:#8B7355">
        <span class="swatch" style="background:#F7F4F0;border:1.5px solid #8B7355;"></span>
        <span class="tab-num">01</span>
        Minéral
      </button>

      <button class="tab" data-target="f-rouge" style="--accent:#C08830">
        <span class="swatch" style="background:#480E1E;"></span>
        <span class="tab-num">02</span>
        Rouge Velvet
      </button>

      <button class="tab" data-target="f-noir" style="--accent:#D4AF37">
        <span class="swatch" style="background:#030303;border:1.5px solid #D4AF37;"></span>
        <span class="tab-num">03</span>
        Noir Doré
      </button>

    </div>
  </div>

  <!-- DESIGN FRAMES -->
  <div class="frames">
    <div class="loader">Chargement…</div>
    <iframe id="f-mineral" class="frame active" src="mineral.html" title="Design Minéral"></iframe>
    <iframe id="f-rouge"   class="frame"        src="rouge-velvet.html" title="Design Rouge Velvet"></iframe>
    <iframe id="f-noir"    class="frame"        src="noir-dore.html" title="Design Noir Doré"></iframe>
  </div>

  <script>
    const tabs   = document.querySelectorAll('.tab');
    const frames = document.querySelectorAll('.frame');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        frames.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.target).classList.add('active');
      });
    });
  </script>

</body>
</html>
